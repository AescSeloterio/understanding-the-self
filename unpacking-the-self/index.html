<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unpacking the Self</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .reveal { opacity: 0; transform: translateY(12px); transition: opacity 0.4s ease, transform 0.4s ease; }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body class="bg-[#FBF9F5] text-stone-800 antialiased font-sans min-h-screen flex flex-col">

    <!-- Top Navigation Header -->
    <header class="sticky top-0 z-30 bg-[#FBF9F5]/90 backdrop-blur border-b border-stone-200 px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <!-- Mobile Menu Toggle Button (Hamburger) -->
            <button id="mobile-menu-btn" class="lg:hidden p-2 text-stone-700 hover:bg-stone-200/60 rounded-lg transition">
                <i data-lucide="menu" class="w-6 h-6"></i>
            </button>
            
            <a href="#" onclick="navigateTo('dashboard')" class="flex items-center gap-2 text-stone-900 font-serif font-bold text-lg">
                <i data-lucide="graduation-cap" class="w-6 h-6 text-amber-800"></i>
                <span>Unpacking the Self</span>
            </a>
        </div>

        <button onclick="openOutlineModal()" class="text-xs sm:text-sm text-stone-600 hover:text-stone-900 font-medium flex items-center gap-2">
            <span>Course outline</span>
            <div class="w-12 sm:w-16 h-1.5 bg-stone-200 rounded-full overflow-hidden">
                <div id="topProgressBar" class="h-full bg-amber-700 transition-all duration-300" style="width: 0%"></div>
            </div>
            <span id="topPercentText" class="text-xs text-stone-500">0%</span>
        </button>
    </header>

    <!-- Main App Container -->
    <div class="flex-1 flex relative">
        
        <!-- Mobile Sidebar Overlay (Backdrop) -->
        <div id="sidebar-overlay" class="fixed inset-0 bg-stone-900/40 backdrop-blur-sm z-40 hidden lg:hidden transition-opacity"></div>

        <!-- Sidebar Navigation Drawer -->
        <aside id="sidebar" class="fixed lg:sticky top-0 lg:top-[57px] left-0 h-full lg:h-[calc(100vh-57px)] w-72 bg-[#FBF9F5] border-r border-stone-200 p-6 z-50 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out flex flex-col justify-between overflow-y-auto">
            <div>
                <!-- Mobile Drawer Header -->
                <div class="flex items-center justify-between pb-4 mb-4 border-b border-stone-200 lg:hidden">
                    <span class="font-serif font-bold text-lg text-stone-900">Course outline</span>
                    <button id="close-sidebar-btn" class="p-1 text-stone-500 hover:text-stone-900">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>

                <div class="mb-6 flex items-center justify-between text-xs font-bold tracking-widest text-stone-400 uppercase">
                    <span>YOUR PROGRESS</span>
                    <span id="sidebarProgressCount" class="text-stone-600">0/7</span>
                </div>

                <nav id="sidebarNav" class="space-y-1">
                    <!-- Dynamic Nav Items Rendered via script.js -->
                </nav>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main id="mainContent" class="flex-1 p-4 sm:p-8 lg:p-12 max-w-4xl mx-auto w-full">
            <!-- Dynamic Content Rendered Here -->
        </main>
    </div>

    <!-- Course Outline Modal -->
    <div id="outlineModal" class="fixed inset-0 bg-stone-900/40 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-[#FBF9F5] max-w-lg w-full rounded-2xl p-6 border border-stone-200 shadow-xl space-y-4 max-h-[85vh] overflow-y-auto">
            <div class="flex justify-between items-center border-b border-stone-200 pb-3">
                <h3 class="font-serif font-bold text-xl text-stone-900">Course Outline</h3>
                <button onclick="closeOutlineModal()" class="text-stone-400 hover:text-stone-800 p-1">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div id="outlineList" class="space-y-2"></div>
        </div>
    </div>

    <!-- Page Scripts -->
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
